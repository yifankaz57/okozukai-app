<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👨‍👩‍👧 おこづかい管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F7FA;--surface:#FFFFFF;--border:#E8ECF0;--text:#1A2332;--muted:#6B7A8D;
    --yellow:#FFD166;--yellow-light:#FFF8E6;--yellow-dark:#8A6800;
    --green:#06D6A0;--green-light:#E6FAF5;--green-dark:#026B50;
    --red:#EF476F;--red-light:#FEE8EE;--red-dark:#7A1535;
    --blue:#118AB2;--blue-light:#E6F4FA;--blue-dark:#074E6B;
    --purple:#7C3AED;--purple-light:#F0EBFF;
    --radius:16px;--shadow:0 2px 12px rgba(0,0,0,0.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .page{max-width:900px;margin:0 auto;padding:2rem 1rem 4rem;}
  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;text-decoration:none;margin-bottom:1.5rem;}
  .back-link:hover{color:var(--text);}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px;}
  .page-title{font-family:'Nunito',sans-serif;font-size:24px;font-weight:900;}
  .month-nav{display:flex;align-items:center;gap:8px;}
  .month-nav button{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:18px;transition:all .15s;}
  .month-nav button:hover{background:var(--border);}
  .month-label{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;min-width:100px;text-align:center;}

  /* Page tabs */
  .page-tabs{display:flex;gap:6px;margin-bottom:1.5rem;border-bottom:2px solid var(--border);padding-bottom:0;}
  .page-tab{padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;font-family:'Zen Maru Gothic',sans-serif;transition:all .15s;}
  .page-tab:hover{color:var(--text);}
  .page-tab.active{color:var(--purple);border-bottom-color:var(--purple);}
  .page-content{display:none;}
  .page-content.active{display:block;}

  /* Summary */
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.5rem;}
  .summary-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:var(--shadow);padding:1.2rem 1.4rem;}
  .summary-name{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .summary-amount{font-family:'Nunito',sans-serif;font-size:36px;font-weight:900;line-height:1;}
  .summary-amount .yen{font-size:18px;color:var(--muted);}
  .summary-sub{font-size:12px;color:var(--muted);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;}
  .sub-plus{color:var(--green-dark);}
  .sub-minus{color:var(--red-dark);}
  .child-tabs{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap;}
  .child-tab{padding:8px 18px;border-radius:999px;border:1.5px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--muted);font-family:'Zen Maru Gothic',sans-serif;transition:all .15s;}
  .child-tab.active{background:var(--text);color:#fff;border-color:var(--text);}
  .section-title{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
  .chart-wrap{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:var(--shadow);padding:1.2rem 1.4rem;margin-bottom:1.5rem;}
  .chart-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;}
  .chart-bars{display:flex;flex-direction:column;gap:10px;}
  .bar-row{display:flex;align-items:center;gap:10px;}
  .bar-label{font-size:12px;font-weight:700;width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;background:var(--bg);border-radius:999px;height:20px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:999px;transition:width .6s ease;display:flex;align-items:center;padding-left:8px;}
  .bar-fill span{font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:#fff;white-space:nowrap;}
  .bar-val{font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;width:52px;text-align:right;flex-shrink:0;}
  .log-table-wrap{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:1.5rem;}
  .log-table{width:100%;border-collapse:collapse;font-size:13px;}
  .log-table th{padding:10px 14px;text-align:left;font-size:12px;font-weight:700;color:var(--muted);background:var(--bg);border-bottom:1.5px solid var(--border);}
  .log-table td{padding:10px 14px;border-bottom:1px solid var(--border);}
  .log-table tr:last-child td{border-bottom:none;}
  .log-table tr:hover td{background:#F9FAFB;}
  .pts-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;}
  .pts-badge.plus,.pts-badge.asked{background:var(--green-light);color:var(--green-dark);}
  .pts-badge.asked{background:var(--blue-light);color:var(--blue-dark);}
  .pts-badge.minus{background:var(--red-light);color:var(--red-dark);}
  .mode-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;}
  .mode-badge.plus{background:var(--green-light);color:var(--green-dark);}
  .mode-badge.asked{background:var(--blue-light);color:var(--blue-dark);}
  .mode-badge.minus{background:var(--red-light);color:var(--red-dark);}
  .empty{padding:2rem;text-align:center;color:var(--muted);font-size:14px;}
  .loading{padding:2rem;text-align:center;color:var(--muted);font-size:14px;}

  /* ===== TASK MANAGER ===== */
  .task-manager-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:10px;}
  .btn-add{display:inline-flex;align-items:center;gap:6px;background:var(--purple);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;transition:all .15s;box-shadow:0 2px 8px #7C3AED44;}
  .btn-add:hover{background:#6D28D9;transform:translateY(-1px);}
  .cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
  .cat-btn{padding:6px 14px;border-radius:999px;border:1.5px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--muted);font-family:'Zen Maru Gothic',sans-serif;transition:all .15s;}
  .cat-btn.active{background:var(--purple);color:#fff;border-color:var(--purple);}
  .task-list{display:flex;flex-direction:column;gap:8px;}
  .task-row{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:var(--shadow);padding:12px 16px;display:flex;align-items:center;gap:12px;transition:all .15s;}
  .task-row:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);}
  .task-row.penalty-row{border-left:4px solid var(--red);}
  .task-row-icon{font-size:24px;width:40px;text-align:center;flex-shrink:0;}
  .task-row-info{flex:1;min-width:0;}
  .task-row-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px;}
  .task-row-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;}
  .task-row-actions{display:flex;gap:6px;flex-shrink:0;}
  .btn-edit{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;transition:all .15s;}
  .btn-edit:hover{border-color:var(--blue);color:var(--blue);}
  .btn-del{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;transition:all .15s;}
  .btn-del:hover{border-color:var(--red);color:var(--red);background:var(--red-light);}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface);border-radius:24px;padding:2rem;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2);transform:scale(.95);transition:transform .2s;}
  .modal-overlay.open .modal{transform:scale(1);}
  .modal-title{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;margin-bottom:1.5rem;}
  .form-row{margin-bottom:1rem;}
  .form-label{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;}
  .form-input{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:'Zen Maru Gothic',sans-serif;color:var(--text);background:var(--bg);transition:border .15s;outline:none;}
  .form-input:focus{border-color:var(--purple);}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
  .form-check{display:flex;align-items:center;gap:8px;margin-bottom:1rem;cursor:pointer;}
  .form-check input{width:18px;height:18px;cursor:pointer;accent-color:var(--red);}
  .form-check span{font-size:14px;font-weight:700;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem;}
  .btn-cancel{padding:10px 20px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;transition:all .15s;}
  .btn-cancel:hover{border-color:var(--text);color:var(--text);}
  .btn-save{padding:10px 24px;border-radius:10px;border:none;background:var(--purple);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;transition:all .15s;}
  .btn-save:hover{background:#6D28D9;}
  .color-picks{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .color-pick{width:28px;height:28px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:all .15s;}
  .color-pick.selected{border-color:var(--text);transform:scale(1.15);}
</style>
</head>
<body>
<div class="page">
  <a class="back-link" href="index.html">← 子ども画面にもどる</a>
  <div class="page-header">
    <div class="page-title">👨‍👩‍👧 おこづかい管理</div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <div class="month-label" id="month-label"></div>
      <button onclick="changeMonth(1)">▶</button>
    </div>
  </div>

  <div class="page-tabs">
    <div class="page-tab active" onclick="switchTab('stats')">📊 集計</div>
    <div class="page-tab" onclick="switchTab('tasks')">✏️ タスク管理</div>
  </div>

  <!-- 集計タブ -->
  <div class="page-content active" id="tab-stats">
    <div class="summary-grid" id="summary-grid"><div class="loading">読み込み中…</div></div>
    <div class="child-tabs" id="child-tabs"></div>
    <div class="chart-wrap">
      <div class="chart-title">📊 カテゴリ別</div>
      <div class="chart-bars" id="chart-bars"><div class="loading">読み込み中…</div></div>
    </div>
    <div class="section-title">
      <span>📋 きろく一覧</span>
      <span id="log-count" style="font-size:12px;"></span>
    </div>
    <div class="log-table-wrap">
      <table class="log-table">
        <thead><tr><th>日時</th><th>こども</th><th>タスク</th><th>カテゴリ</th><th>種別</th><th>金額</th></tr></thead>
        <tbody id="log-tbody"><tr><td colspan="6" class="loading">読み込み中…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- タスク管理タブ -->
  <div class="page-content" id="tab-tasks">
    <div class="task-manager-header">
      <div style="font-size:14px;font-weight:700;color:var(--muted)">タスクの追加・編集・削除ができます</div>
      <button class="btn-add" onclick="openModal()">＋ タスクを追加</button>
    </div>
    <div class="cat-filter" id="cat-filter"></div>
    <div class="task-list" id="task-list"><div class="loading">読み込み中…</div></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">タスクを追加</div>
    <div class="form-row">
      <label class="form-label">タスク名</label>
      <input class="form-input" id="f-name" placeholder="例：机の上を片付ける">
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">カテゴリ</label>
        <input class="form-input" id="f-cat" placeholder="例：リビング">
      </div>
      <div>
        <label class="form-label">アイコン（絵文字）</label>
        <input class="form-input" id="f-icon" placeholder="例：🪣">
      </div>
    </div>
    <label class="form-check" id="penalty-check">
      <input type="checkbox" id="f-penalty" onchange="togglePenalty()">
      <span>ペナルティ（マイナス）にする</span>
    </label>
    <div id="pts-normal">
      <div class="form-row-2">
        <div>
          <label class="form-label">言われて（円）</label>
          <input class="form-input" id="f-asked" type="number" placeholder="例：10">
        </div>
        <div>
          <label class="form-label">自分で（円）</label>
          <input class="form-input" id="f-self" type="number" placeholder="例：20">
        </div>
      </div>
    </div>
    <div id="pts-penalty" style="display:none">
      <div class="form-row">
        <label class="form-label">ペナルティ金額（円、マイナスで入力）</label>
        <input class="form-input" id="f-pen-pts" type="number" placeholder="例：-10">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">背景色</label>
      <div class="color-picks" id="color-picks"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://qoixsckcwchhyrbhbnwv.supabase.co';
const SUPABASE_KEY='sb_publishable_wURtna__TWo7S5F1EIHrcg_dI81aIAO';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const CHILDREN=['さつき','あおい'];
const CHILD_COLORS=['#7C3AED','#118AB2'];
const BG_COLORS=['#EEE0FF','#FFE8F3','#D4F7EE','#D4EEF7','#FFF3CC','#FDDEE6','#FFF8CC','#DCF5FF'];

let currentDate=new Date();
let activeChild='すべて';
let allLogs=[];
let allTasks=[];
let taskCatFilter='すべて';
let editingTaskId=null;
let selectedBg=BG_COLORS[0];

// Page tabs
function switchTab(tab){
  document.querySelectorAll('.page-tab').forEach((t,i)=>t.classList.toggle('active',['stats','tasks'][i]===tab));
  document.querySelectorAll('.page-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='tasks')renderTaskManager();
}

// Month nav
function getYearMonth(){return `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`;}
function getNextMonth(){const d=new Date(currentDate.getFullYear(),currentDate.getMonth()+1,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function updateMonthLabel(){document.getElementById('month-label').textContent=`${currentDate.getFullYear()}年${currentDate.getMonth()+1}月`;}
function changeMonth(d){currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+d,1);updateMonthLabel();loadStats();}

// Stats
async function loadStats(){
  document.getElementById('summary-grid').innerHTML='<div class="loading">読み込み中…</div>';
  const ym=getYearMonth();
  const{data}=await sb.from('logs').select('*')
    .gte('created_at',ym+'-01T00:00:00')
    .lt('created_at',getNextMonth()+'-01T00:00:00')
    .order('created_at',{ascending:false});
  allLogs=data||[];
  renderSummary();renderChildTabs();renderChart();renderTable();
}

function renderSummary(){
  document.getElementById('summary-grid').innerHTML=CHILDREN.map((name,i)=>{
    const logs=allLogs.filter(l=>l.child_name===name);
    const total=logs.reduce((s,l)=>s+l.points,0);
    const plus=logs.filter(l=>l.points>0).reduce((s,l)=>s+l.points,0);
    const minus=logs.filter(l=>l.points<0).reduce((s,l)=>s+l.points,0);
    return `<div class="summary-card" style="border-top:4px solid ${CHILD_COLORS[i]}">
      <div class="summary-name"><span style="width:10px;height:10px;border-radius:50%;background:${CHILD_COLORS[i]};display:inline-block"></span>${name}</div>
      <div class="summary-amount" style="color:${CHILD_COLORS[i]}">${total.toLocaleString()}<span class="yen">円</span></div>
      <div class="summary-sub"><span class="sub-plus">▲ +${plus}円</span><span class="sub-minus">▼ ${minus}円</span><span>${logs.length}件</span></div>
    </div>`;
  }).join('');
}
function renderChildTabs(){
  document.getElementById('child-tabs').innerHTML=['すべて',...CHILDREN].map(c=>
    `<div class="child-tab${c===activeChild?' active':''}" onclick="setChild('${c}')">${c}</div>`
  ).join('');
}
function setChild(c){activeChild=c;renderChildTabs();renderChart();renderTable();}
function filteredLogs(){return activeChild==='すべて'?allLogs:allLogs.filter(l=>l.child_name===activeChild);}
function renderChart(){
  const logs=filteredLogs().filter(l=>l.points>0);
  const catMap={};logs.forEach(l=>{catMap[l.task_category]=(catMap[l.task_category]||0)+l.points;});
  const sorted=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?.[1]||1;
  const colors=['#7C3AED','#118AB2','#06D6A0','#FFD166','#EF476F','#FF7F3F'];
  const el=document.getElementById('chart-bars');
  if(!sorted.length){el.innerHTML='<div class="empty">データなし</div>';return;}
  el.innerHTML=sorted.map(([cat,pts],i)=>`
    <div class="bar-row">
      <div class="bar-label">${cat}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(pts/max*100).toFixed(1)}%;background:${colors[i%colors.length]}"><span>${pts}円</span></div></div>
      <div class="bar-val" style="color:${colors[i%colors.length]}">${pts}円</div>
    </div>`).join('');
}
function renderTable(){
  const logs=filteredLogs();
  document.getElementById('log-count').textContent=`${logs.length}件`;
  const tbody=document.getElementById('log-tbody');
  if(!logs.length){tbody.innerHTML='<tr><td colspan="6" class="empty">きろくがありません</td></tr>';return;}
  tbody.innerHTML=logs.map(l=>{
    const d=new Date(l.created_at);
    const dateStr=`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const ci=CHILDREN.indexOf(l.child_name);
    const color=CHILD_COLORS[ci]||'#999';
    return `<tr>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">${dateStr}</td>
      <td><span style="color:${color};font-weight:700">${l.child_name}</span></td>
      <td>${l.task_name}</td>
      <td style="font-size:12px;color:var(--muted)">${l.task_category}</td>
      <td><span class="mode-badge ${l.mode}">${l.mode==='plus'?'自分で':l.mode==='asked'?'言われて':'ペナルティ'}</span></td>
      <td><span class="pts-badge ${l.mode}">${l.points>0?'+'+l.points:l.points}円</span></td>
    </tr>`;
  }).join('');
}

// ===== TASK MANAGER =====
async function loadTasks(){
  const{data}=await sb.from('tasks').select('*').order('sort_order');
  allTasks=data||[];
  renderTaskManager();
}
function renderTaskManager(){
  const cats=['すべて',...new Set(allTasks.map(t=>t.cat))];
  document.getElementById('cat-filter').innerHTML=cats.map(c=>
    `<div class="cat-btn${c===taskCatFilter?' active':''}" onclick="setCatFilter('${c}')">${c}</div>`
  ).join('');
  const list=taskCatFilter==='すべて'?allTasks:allTasks.filter(t=>t.cat===taskCatFilter);
  const el=document.getElementById('task-list');
  if(!list.length){el.innerHTML='<div class="empty">タスクがありません</div>';return;}
  el.innerHTML=list.map(t=>`
    <div class="task-row${t.penalty?' penalty-row':''}">
      <div class="task-row-icon" style="background:${t.bg||'#EEE0FF'};border-radius:10px;padding:4px">${t.icon}</div>
      <div class="task-row-info">
        <div class="task-row-name">${t.name}</div>
        <div class="task-row-meta">
          <span>📁 ${t.cat}</span>
          ${t.penalty?`<span style="color:var(--red-dark)">ペナルティ ${t.asked}円</span>`:`
            ${t.asked!=null?`<span>言われて +${t.asked}円</span>`:''}
            ${t.self!=null?`<span>自分で +${t.self}円</span>`:''}
          `}
        </div>
      </div>
      <div class="task-row-actions">
        <button class="btn-edit" onclick="openModal('${t.id}')">編集</button>
        <button class="btn-del" onclick="deleteTask('${t.id}')">削除</button>
      </div>
    </div>`).join('');
}
function setCatFilter(c){taskCatFilter=c;renderTaskManager();}

// Modal
function openModal(taskId=null){
  editingTaskId=taskId;
  selectedBg=BG_COLORS[0];
  document.getElementById('modal-title').textContent=taskId?'タスクを編集':'タスクを追加';
  // Color picks
  document.getElementById('color-picks').innerHTML=BG_COLORS.map(c=>
    `<div class="color-pick${c===selectedBg?' selected':''}" style="background:${c}" onclick="selectBg('${c}')"></div>`
  ).join('');
  if(taskId){
    const t=allTasks.find(t=>t.id===taskId);
    if(!t)return;
    document.getElementById('f-name').value=t.name;
    document.getElementById('f-cat').value=t.cat;
    document.getElementById('f-icon').value=t.icon;
    document.getElementById('f-penalty').checked=t.penalty;
    selectedBg=t.bg||BG_COLORS[0];
    togglePenalty();
    if(t.penalty){
      document.getElementById('f-pen-pts').value=t.asked;
    }else{
      document.getElementById('f-asked').value=t.asked??'';
      document.getElementById('f-self').value=t.self??'';
    }
    document.getElementById('color-picks').innerHTML=BG_COLORS.map(c=>
      `<div class="color-pick${c===selectedBg?' selected':''}" style="background:${c}" onclick="selectBg('${c}')"></div>`
    ).join('');
  }else{
    document.getElementById('f-name').value='';
    document.getElementById('f-cat').value='';
    document.getElementById('f-icon').value='';
    document.getElementById('f-penalty').checked=false;
    document.getElementById('f-asked').value='';
    document.getElementById('f-self').value='';
    document.getElementById('f-pen-pts').value='';
    togglePenalty();
  }
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
function togglePenalty(){
  const pen=document.getElementById('f-penalty').checked;
  document.getElementById('pts-normal').style.display=pen?'none':'block';
  document.getElementById('pts-penalty').style.display=pen?'block':'none';
}
function selectBg(c){
  selectedBg=c;
  document.querySelectorAll('.color-pick').forEach(el=>el.classList.toggle('selected',el.style.background===c));
}

async function saveTask(){
  const name=document.getElementById('f-name').value.trim();
  const cat=document.getElementById('f-cat').value.trim();
  const icon=document.getElementById('f-icon').value.trim()||'📝';
  const penalty=document.getElementById('f-penalty').checked;
  if(!name||!cat){alert('タスク名とカテゴリは必須です');return;}
  let asked=null,self=null;
  if(penalty){
    asked=parseInt(document.getElementById('f-pen-pts').value)||0;
    if(asked>0)asked=-asked;
  }else{
    const av=document.getElementById('f-asked').value;
    const sv=document.getElementById('f-self').value;
    if(av!=='')asked=parseInt(av);
    if(sv!=='')self=parseInt(sv);
  }
  const maxOrder=allTasks.length?Math.max(...allTasks.map(t=>t.sort_order)):0;
  const payload={name,cat,icon,penalty,asked,self:self,bg:selectedBg,sort_order:editingTaskId?allTasks.find(t=>t.id===editingTaskId)?.sort_order:maxOrder+1};
  let error;
  if(editingTaskId){
    ({error}=await sb.from('tasks').update(payload).eq('id',editingTaskId));
  }else{
    ({error}=await sb.from('tasks').insert(payload));
  }
  if(error){alert('保存エラー: '+error.message);return;}
  closeModal();
  await loadTasks();
}

async function deleteTask(id){
  const t=allTasks.find(t=>t.id===id);
  if(!t)return;
  if(!confirm(`「${t.name}」を削除しますか？`))return;
  const{error}=await sb.from('tasks').delete().eq('id',id);
  if(error){alert('削除エラー: '+error.message);return;}
  await loadTasks();
}

updateMonthLabel();
loadStats();
loadTasks();
</script>
