<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👨‍👩‍👧 おこづかい管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F5F7FA;--surface:#FFFFFF;--border:#E8ECF0;--text:#1A2332;--muted:#6B7A8D;
    --yellow:#FFD166;--yellow-light:#FFF8E6;--yellow-dark:#8A6800;
    --green:#06D6A0;--green-light:#E6FAF5;--green-dark:#026B50;
    --red:#EF476F;--red-light:#FEE8EE;--red-dark:#7A1535;
    --blue:#118AB2;--blue-light:#E6F4FA;--blue-dark:#074E6B;
    --purple:#7C3AED;--purple-light:#F0EBFF;
    --radius:16px;--shadow:0 2px 12px rgba(0,0,0,0.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .page{max-width:820px;margin:0 auto;padding:2rem 1rem 4rem;}

  /* Header */
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px;}
  .page-title{font-family:'Nunito',sans-serif;font-size:24px;font-weight:900;display:flex;align-items:center;gap:10px;}
  .month-nav{display:flex;align-items:center;gap:8px;}
  .month-nav button{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:18px;transition:all .15s;}
  .month-nav button:hover{background:var(--border);}
  .month-label{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;min-width:100px;text-align:center;}

  /* Summary cards */
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:2rem;}
  .summary-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:var(--shadow);padding:1.2rem 1.4rem;}
  .summary-name{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .summary-amount{font-family:'Nunito',sans-serif;font-size:36px;font-weight:900;line-height:1;}
  .summary-amount .yen{font-size:18px;color:var(--muted);}
  .summary-sub{font-size:12px;color:var(--muted);margin-top:6px;display:flex;gap:10px;}
  .sub-plus{color:var(--green-dark);}
  .sub-minus{color:var(--red-dark);}

  /* Child tabs */
  .child-tabs{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap;}
  .child-tab{padding:8px 18px;border-radius:999px;border:1.5px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--muted);font-family:'Zen Maru Gothic',sans-serif;transition:all .15s;}
  .child-tab.active{background:var(--text);color:#fff;border-color:var(--text);}

  /* Log table */
  .section-title{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
  .log-table-wrap{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:1.5rem;}
  .log-table{width:100%;border-collapse:collapse;font-size:13px;}
  .log-table th{padding:10px 14px;text-align:left;font-size:12px;font-weight:700;color:var(--muted);background:var(--bg);border-bottom:1.5px solid var(--border);}
  .log-table td{padding:10px 14px;border-bottom:1px solid var(--border);}
  .log-table tr:last-child td{border-bottom:none;}
  .log-table tr:hover td{background:#F9FAFB;}
  .pts-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;}
  .pts-badge.plus{background:var(--green-light);color:var(--green-dark);}
  .pts-badge.minus{background:var(--red-light);color:var(--red-dark);}
  .mode-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;}
  .mode-badge.plus{background:var(--blue-light);color:var(--blue-dark);}
  .mode-badge.minus{background:var(--red-light);color:var(--red-dark);}

  /* Bar chart */
  .chart-wrap{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:var(--shadow);padding:1.2rem 1.4rem;margin-bottom:1.5rem;}
  .chart-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;}
  .chart-bars{display:flex;flex-direction:column;gap:10px;}
  .bar-row{display:flex;align-items:center;gap:10px;}
  .bar-label{font-size:12px;font-weight:700;width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;background:var(--bg);border-radius:999px;height:20px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:999px;transition:width .6s ease;display:flex;align-items:center;padding-left:8px;}
  .bar-fill span{font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:#fff;white-space:nowrap;}
  .bar-val{font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;width:52px;text-align:right;flex-shrink:0;}

  .empty{padding:2rem;text-align:center;color:var(--muted);font-size:14px;}
  .loading{padding:2rem;text-align:center;color:var(--muted);font-size:14px;}

  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;text-decoration:none;margin-bottom:1.5rem;}
  .back-link:hover{color:var(--text);}

  .child-colors{--c0:#7C3AED;--c1:#118AB2;--c2:#06D6A0;}
</style>
</head>
<body>
<div class="page child-colors">
  <a class="back-link" href="index.html">← 子ども画面にもどる</a>

  <div class="page-header">
    <div class="page-title">👨‍👩‍👧 おこづかい管理</div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <div class="month-label" id="month-label">2026年6月</div>
      <button onclick="changeMonth(1)">▶</button>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-grid" id="summary-grid">
    <div class="loading">読み込み中…</div>
  </div>

  <!-- Child filter tabs -->
  <div class="child-tabs" id="child-tabs"></div>

  <!-- Category chart -->
  <div class="chart-wrap">
    <div class="chart-title">📊 カテゴリ別</div>
    <div class="chart-bars" id="chart-bars"><div class="loading">読み込み中…</div></div>
  </div>

  <!-- Log table -->
  <div class="section-title">
    <span>📋 きろく一覧</span>
    <span id="log-count" style="font-size:12px;"></span>
  </div>
  <div class="log-table-wrap">
    <table class="log-table">
      <thead><tr>
        <th>日時</th><th>こども</th><th>タスク</th><th>カテゴリ</th><th>種別</th><th>金額</th>
      </tr></thead>
      <tbody id="log-tbody"><tr><td colspan="6" class="loading">読み込み中…</td></tr></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qoixsckcwchhyrbhbnwv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wURtna__TWo7S5F1EIHrcg_dI81aIAO';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CHILDREN = ['こども1','こども2','こども3'];
const CHILD_COLORS = ['#7C3AED','#118AB2','#06D6A0'];

let currentDate = new Date();
let activeChild = 'すべて';
let allLogs = [];

function getYearMonth() {
  return `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`;
}

function updateMonthLabel() {
  document.getElementById('month-label').textContent = `${currentDate.getFullYear()}年${currentDate.getMonth()+1}月`;
}

function changeMonth(delta) {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + delta, 1);
  updateMonthLabel();
  loadData();
}

async function loadData() {
  const ym = getYearMonth();
  document.getElementById('summary-grid').innerHTML = '<div class="loading">読み込み中…</div>';
  document.getElementById('log-tbody').innerHTML = '<tr><td colspan="6" class="loading">読み込み中…</td></tr>';

  const { data, error } = await sb.from('logs')
    .select('*')
    .gte('created_at', ym + '-01T00:00:00')
    .lt('created_at', getNextMonth() + '-01T00:00:00')
    .order('created_at', { ascending: false });

  if (error) { console.error(error); return; }
  allLogs = data || [];
  render();
}

function getNextMonth() {
  const d = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function render() {
  renderSummary();
  renderChildTabs();
  renderChart();
  renderTable();
}

function renderSummary() {
  const el = document.getElementById('summary-grid');
  el.innerHTML = CHILDREN.map((name, i) => {
    const logs = allLogs.filter(l => l.child_name === name);
    const total = logs.reduce((s,l) => s + l.points, 0);
    const plus  = logs.filter(l=>l.points>0).reduce((s,l)=>s+l.points,0);
    const minus = logs.filter(l=>l.points<0).reduce((s,l)=>s+l.points,0);
    const color = CHILD_COLORS[i];
    return `<div class="summary-card" style="border-top:4px solid ${color}">
      <div class="summary-name"><span style="width:10px;height:10px;border-radius:50%;background:${color};display:inline-block;"></span>${name}</div>
      <div class="summary-amount" style="color:${color}">${total.toLocaleString()}<span class="yen">円</span></div>
      <div class="summary-sub">
        <span class="sub-plus">▲ +${plus}円</span>
        <span class="sub-minus">▼ ${minus}円</span>
        <span style="color:var(--muted)">${logs.length}件</span>
      </div>
    </div>`;
  }).join('');
}

function renderChildTabs() {
  const tabs = ['すべて', ...CHILDREN];
  document.getElementById('child-tabs').innerHTML = tabs.map(c =>
    `<div class="child-tab${c===activeChild?' active':''}" onclick="setChild('${c}')">${c}</div>`
  ).join('');
}

function setChild(c) { activeChild = c; renderChildTabs(); renderChart(); renderTable(); }

function filteredLogs() {
  return activeChild === 'すべて' ? allLogs : allLogs.filter(l => l.child_name === activeChild);
}

function renderChart() {
  const logs = filteredLogs().filter(l => l.points > 0);
  const catMap = {};
  logs.forEach(l => { catMap[l.task_category] = (catMap[l.task_category] || 0) + l.points; });
  const sorted = Object.entries(catMap).sort((a,b) => b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;
  const colors = ['#7C3AED','#118AB2','#06D6A0','#FFD166','#EF476F','#FF7F3F'];
  const el = document.getElementById('chart-bars');
  if (!sorted.length) { el.innerHTML = '<div class="empty">データなし</div>'; return; }
  el.innerHTML = sorted.map(([cat, pts], i) => `
    <div class="bar-row">
      <div class="bar-label">${cat}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(pts/max*100).toFixed(1)}%;background:${colors[i%colors.length]}">
          <span>${pts}円</span>
        </div>
      </div>
      <div class="bar-val" style="color:${colors[i%colors.length]}">${pts}円</div>
    </div>`).join('');
}

function renderTable() {
  const logs = filteredLogs();
  document.getElementById('log-count').textContent = `${logs.length}件`;
  const tbody = document.getElementById('log-tbody');
  if (!logs.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">きろくがありません</td></tr>'; return; }
  tbody.innerHTML = logs.map(l => {
    const d = new Date(l.created_at);
    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const ci = CHILDREN.indexOf(l.child_name);
    const color = CHILD_COLORS[ci] || '#999';
    const modeLabel = l.mode === 'plus' ? (l.points >= 100 ? '特別' : l.task_name.includes('言われて') || l.task_name ? '言われて' : '自分で') : 'ペナルティ';
    return `<tr>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">${dateStr}</td>
      <td><span style="color:${color};font-weight:700">${l.child_name}</span></td>
      <td>${l.task_name}</td>
      <td><span style="font-size:12px;color:var(--muted)">${l.task_category}</span></td>
      <td><span class="mode-badge ${l.mode}">${l.mode==='plus'?'プラス':'ペナルティ'}</span></td>
      <td><span class="pts-badge ${l.mode}">${l.points>0?'+'+l.points:l.points}円</span></td>
    </tr>`;
  }).join('');
}

updateMonthLabel();
loadData();
</script>
</body>
</html>
