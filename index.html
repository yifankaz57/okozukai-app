<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪙 おこづかいトラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#FFF8F0;--surface:#FFFFFF;--border:#F0E8DC;--text:#2D1B0E;--muted:#8B6F5E;
    --yellow:#FFD166;--yellow-light:#FFF3CC;--yellow-dark:#B8860B;
    --green:#06D6A0;--green-light:#D4F7EE;--green-dark:#047A5C;
    --red:#EF476F;--red-light:#FDDEE6;--red-dark:#8B1A35;
    --blue:#118AB2;--blue-light:#D4EEF7;--blue-dark:#0A4E66;
    --radius:18px;--shadow:0 4px 20px rgba(0,0,0,0.08);--shadow-hover:0 8px 30px rgba(0,0,0,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Zen Maru Gothic',sans-serif;background:#FFF8F0;color:var(--text);min-height:100vh;transition:background .5s ease;}
  body::before{content:'';position:fixed;inset:0;background-size:28px 28px;pointer-events:none;z-index:0;}
  body.theme-satsuki::before{background-image:radial-gradient(circle,#90CAF933 1.5px,transparent 1.5px);}
  body.theme-aoi::before{background-image:radial-gradient(circle,#F4849233 1.5px,transparent 1.5px);}
  body.theme-default::before{background-image:radial-gradient(circle,#FFD16622 1.5px,transparent 1.5px);}
  body.theme-satsuki .header,.theme-satsuki .name-selector,.theme-satsuki .log-section,.theme-satsuki .task-card{border-color:#BBDEFB;}
  body.theme-aoi .header,.theme-aoi .name-selector,.theme-aoi .log-section,.theme-aoi .task-card{border-color:#F8BBD0;}
  body.theme-satsuki .child-name-display{background:#DDEEFF;border-color:#90CAF9;color:#0A3D6B;}
  body.theme-satsuki .month-tag{background:#DDEEFF;border-color:#90CAF9;color:#0A3D6B;}
  body.theme-aoi .child-name-display{background:#FFE0EE;border-color:#F48492;color:#7A1535;}
  body.theme-aoi .month-tag{background:#FFE0EE;border-color:#F48492;color:#7A1535;}
  .container{max-width:540px;margin:0 auto;padding:1.5rem 1rem 4rem;position:relative;z-index:1;}
  .name-selector{background:var(--surface);border-radius:28px;border:2px solid var(--border);box-shadow:var(--shadow);padding:1.2rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;}
  .name-label{font-size:14px;font-weight:700;color:var(--muted);white-space:nowrap;}
  .name-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .name-btn{padding:8px 18px;border-radius:999px;border:2px solid var(--border);font-size:14px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--muted);font-family:'Zen Maru Gothic',sans-serif;transition:all .18s;}
  .name-btn.active{background:var(--yellow);color:var(--yellow-dark);border-color:var(--yellow);box-shadow:0 3px 10px #FFD16666;}
  .header{text-align:center;margin-bottom:1.5rem;padding:1.5rem 1.5rem 1.2rem;background:var(--surface);border-radius:28px;border:2px solid var(--border);box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .header::before{content:'';position:absolute;top:-20px;right:-20px;width:120px;height:120px;background:radial-gradient(circle,#FFD16644,transparent 70%);border-radius:50%;}
  .header-top{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px;}
  .child-name-display{font-family:'Zen Maru Gothic',sans-serif;font-size:28px;font-weight:700;color:var(--yellow-dark);background:var(--yellow-light);border:2px solid var(--yellow);border-radius:14px;padding:4px 16px;line-height:1.3;white-space:nowrap;}
  .app-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}
  .coin-display{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
  .coin-icon{font-size:40px;animation:coinBounce 2s ease-in-out infinite;}
  @keyframes coinBounce{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-6px) rotate(5deg);}}
  .total-amount{font-family:'Nunito',sans-serif;font-size:52px;font-weight:900;color:var(--text);line-height:1;}
  .total-amount.pop{animation:popAmount .4s cubic-bezier(.36,.07,.19,.97);}
  @keyframes popAmount{0%{transform:scale(1);}40%{transform:scale(1.18);}70%{transform:scale(.95);}100%{transform:scale(1);}}
  .yen-label{font-family:'Nunito',sans-serif;font-size:22px;font-weight:800;color:var(--muted);align-self:flex-end;padding-bottom:8px;}
  .month-tag{display:inline-flex;align-items:center;gap:4px;background:var(--yellow-light);color:var(--yellow-dark);border-radius:999px;padding:5px 14px;font-size:13px;font-weight:700;border:1.5px solid var(--yellow);}
  .tabs-wrap{overflow-x:auto;margin-bottom:1rem;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tabs-wrap::-webkit-scrollbar{display:none;}
  .tabs{display:flex;gap:6px;width:max-content;padding:2px;}
  .tab{padding:8px 16px;border-radius:999px;border:2px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .18s;white-space:nowrap;font-family:'Zen Maru Gothic',sans-serif;}
  .tab:hover{border-color:var(--yellow);color:var(--text);}
  .tab.active{background:var(--yellow);color:var(--yellow-dark);border-color:var(--yellow);transform:translateY(-1px);box-shadow:0 3px 10px #FFD16666;}
  .tasks{display:flex;flex-direction:column;gap:10px;}
  .tasks.disabled{opacity:.5;pointer-events:none;}
  .task-card{background:var(--surface);border-radius:var(--radius);border:2px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:all .2s;}
  .task-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px);}
  .task-card.penalty-card{border-color:#FFCCD9;}
  .task-body{padding:12px 14px;display:flex;align-items:center;gap:12px;}
  .task-emoji{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .task-info{flex:1;min-width:0;}
  .task-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:4px;}
  .task-pts{font-family:'Nunito',sans-serif;font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;}
  .pt-badge{display:inline-flex;align-items:center;gap:2px;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:800;}
  .pt-badge.asked{background:var(--blue-light);color:var(--blue-dark);}
  .pt-badge.self{background:var(--green-light);color:var(--green-dark);}
  .pt-badge.pen{background:var(--red-light);color:var(--red-dark);}
  .task-btns{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
  .btn-action{padding:7px 12px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1;}
  .btn-action:active{transform:scale(.92);}
  .btn-asked{background:var(--blue-light);color:var(--blue-dark);border:1.5px solid #90CCEC;}
  .btn-asked:hover{background:var(--blue);color:#fff;}
  .btn-self{background:var(--green-light);color:var(--green-dark);border:1.5px solid #80DFC6;}
  .btn-self:hover{background:var(--green);color:#fff;}
  .btn-penalty{background:var(--red-light);color:var(--red-dark);border:1.5px solid #F5AABC;}
  .btn-penalty:hover{background:var(--red);color:#fff;}
  .log-section{margin-top:1.5rem;background:var(--surface);border-radius:var(--radius);border:2px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
  .log-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--border);}
  .log-header-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .log-stats{display:flex;gap:8px;padding:12px 14px;border-bottom:2px solid var(--border);}
  .log-stat-card{flex:1;border-radius:12px;padding:8px 6px;text-align:center;}
  .log-stat-label{font-size:11px;font-weight:700;margin-bottom:4px;}
  .log-stat-num{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;line-height:1;}
  .log-stat-unit{font-size:10px;font-weight:700;}
  .log-list{max-height:480px;overflow-y:auto;}
  .log-empty{padding:2rem;text-align:center;color:var(--muted);font-size:14px;}
  .log-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);animation:slideIn .25s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
  .log-item:last-child{border-bottom:none;}
  .log-pts{font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;min-width:52px;text-align:center;padding:4px 8px;border-radius:8px;flex-shrink:0;}
  .log-pts.plus{background:var(--green-light);color:var(--green-dark);}
  .log-pts.self{background:var(--green-light);color:var(--green-dark);}
  .log-pts.asked{background:var(--blue-light);color:var(--blue-dark);}
  .log-pts.minus{background:var(--red-light);color:var(--red-dark);}
  .log-text{flex:1;font-size:13px;font-weight:600;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .log-time{font-family:'Nunito',sans-serif;font-size:11px;color:var(--muted);flex-shrink:0;white-space:nowrap;}
  .log-undo{font-size:11px;font-weight:700;color:var(--muted);background:none;border:1.5px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;flex-shrink:0;transition:all .15s;}
  .log-undo:hover{border-color:var(--red);color:var(--red);}
  .admin-link{display:block;text-align:center;margin-top:1.5rem;color:var(--muted);font-size:12px;text-decoration:none;}
  .admin-link:hover{color:var(--text);}
  .saving{position:fixed;top:16px;right:16px;background:var(--green);color:#fff;border-radius:999px;padding:6px 14px;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;z-index:999;opacity:0;transition:opacity .3s;}
  .saving.show{opacity:1;}
  .loading-screen{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--muted);font-size:14px;}
  .confetti-layer{position:fixed;inset:0;pointer-events:none;z-index:9999;}
  .confetti-piece{position:absolute;animation:fall 1s ease-in forwards;}
  @keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
  .toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
  .toast{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;padding:10px 20px;border-radius:999px;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:toastIn .3s ease,toastOut .4s 1.8s ease forwards;white-space:nowrap;}
  .toast.plus,.toast.asked{background:var(--green);color:#fff;}
  .toast.minus{background:var(--red);color:#fff;}
  @keyframes toastIn{from{opacity:0;transform:translateY(16px) scale(.9);}to{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateY(8px);}}
  .log-list::-webkit-scrollbar{width:4px;}
  .log-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="saving" id="saving">💾 保存中…</div>
<div class="container">
  <div class="name-selector">
    <div class="name-label">👤 だれ？</div>
    <div class="name-btns" id="name-btns">
      <button class="name-btn" onclick="selectChild('さつき')">さつき</button>
      <button class="name-btn" onclick="selectChild('あおい')">あおい</button>
    </div>
  </div>
  <div class="header">
    <div class="header-top">
      <div class="child-name-display" id="child-name-display">さつき</div>
      <div class="app-title">おこづかいトラッカー</div>
    </div>
    <div class="coin-display">
      <div class="coin-icon">🪙</div>
      <div class="total-amount" id="total">0</div>
      <div class="yen-label">円</div>
    </div>
    <div class="month-tag" id="month-tag">📅 2026年6月</div>
  </div>
  <div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
  <div class="tasks" id="tasks"><div class="loading-screen">📋 タスクを読み込み中…</div></div>
  <div class="log-section">
    <div class="log-header">
      <div class="log-header-title">📋 きろく</div>
    </div>
    <div class="log-stats" id="log-stats">
      <div class="log-stat-card" style="background:var(--green-light)">
        <div class="log-stat-label" style="color:var(--green-dark)">🟢 自分で</div>
        <div class="log-stat-num" style="color:var(--green-dark)"><span id="stat-self">0</span><span class="log-stat-unit">件</span></div>
      </div>
      <div class="log-stat-card" style="background:var(--blue-light)">
        <div class="log-stat-label" style="color:var(--blue-dark)">🔵 言われて</div>
        <div class="log-stat-num" style="color:var(--blue-dark)"><span id="stat-asked">0</span><span class="log-stat-unit">件</span></div>
      </div>
      <div class="log-stat-card" style="background:var(--red-light)">
        <div class="log-stat-label" style="color:var(--red-dark)">🔴 ペナルティ</div>
        <div class="log-stat-num" style="color:var(--red-dark)"><span id="stat-penalty">0</span><span class="log-stat-unit">件</span></div>
      </div>
    </div>
    <div class="log-list" id="log-list"><div class="log-empty">まだきろくがありません 🌟</div></div>
  </div>
  <a class="admin-link" href="admin.html">👨‍👩‍👧 親の管理画面</a>
</div>
<div class="toast-container" id="toasts"></div>
<div class="confetti-layer" id="confetti"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qoixsckcwchhyrbhbnwv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wURtna__TWo7S5F1EIHrcg_dI81aIAO';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CHILD_NAMES = ['さつき','あおい'];
let tasks = [];
let activeCat = 'すべて';
let todayLogs = [];
let monthTotal = 0;

const now = new Date();
const yearMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
document.getElementById('month-tag').textContent = `📅 ${now.getFullYear()}年${now.getMonth()+1}月`;

// Cookie
function getCookie(name){const m=document.cookie.match('(?:^|; )'+name+'=([^;]*)');return m?decodeURIComponent(m[1]):null;}
function setCookie(name,value){document.cookie=`${name}=${encodeURIComponent(value)};expires=${new Date(Date.now()+365*24*60*60*1000).toUTCString()};path=/`;}

const savedChild = getCookie('okozukai_child');
let childName = (savedChild && CHILD_NAMES.includes(savedChild)) ? savedChild : 'さつき';

document.querySelectorAll('.name-btn').forEach(b=>b.classList.toggle('active',b.textContent===childName));
document.getElementById('child-name-display').textContent = childName;

function applyTheme(name){
  document.body.classList.remove('theme-satsuki','theme-aoi','theme-default');
  if(name==='さつき'){document.body.classList.add('theme-satsuki');document.body.style.background='#EEF6FF';}
  else if(name==='あおい'){document.body.classList.add('theme-aoi');document.body.style.background='#FFF0F5';}
  else{document.body.classList.add('theme-default');document.body.style.background='#FFF8F0';}
}
applyTheme(childName);

function selectChild(name){
  childName=name;
  setCookie('okozukai_child',name);
  document.querySelectorAll('.name-btn').forEach(b=>b.classList.toggle('active',b.textContent===name));
  document.getElementById('child-name-display').textContent=name;
  applyTheme(name);
  loadData();
}

// Load tasks from Supabase
async function loadTasks(){
  const {data,error}=await sb.from('tasks').select('*').order('sort_order');
  if(error){console.error(error);return;}
  tasks=data||[];
  const cats=['すべて',...new Set(tasks.map(t=>t.cat))];
  renderTabs(cats);
  renderTasks();
}

function renderTabs(cats){
  if(!cats){cats=['すべて',...new Set(tasks.map(t=>t.cat))];}
  document.getElementById('tabs').innerHTML=cats.map(c=>
    `<div class="tab${c===activeCat?' active':''}" onclick="setcat('${c}')">${c}</div>`
  ).join('');
}
function setcat(c){activeCat=c;renderTabs();renderTasks();}

function renderTasks(){
  const list=activeCat==='すべて'?tasks:tasks.filter(t=>t.cat===activeCat);
  if(!list.length){document.getElementById('tasks').innerHTML='<div class="loading-screen">タスクがありません</div>';return;}
  document.getElementById('tasks').innerHTML=list.map(t=>{
    let btns='';
    if(t.penalty){
      btns=`<button class="btn-action btn-penalty" onclick="record('${t.id}','penalty')">−${Math.abs(t.asked)}円</button>`;
    }else{
      if(t.asked!=null) btns+=`<button class="btn-action btn-asked" onclick="record('${t.id}','asked')">言われて<br>+${t.asked}円</button>`;
      if(t.self!=null)  btns+=`<button class="btn-action btn-self"  onclick="record('${t.id}','self')">自分で<br>+${t.self}円</button>`;
    }
    const badges=t.penalty
      ?`<span class="pt-badge pen">${t.asked}円</span>`
      :[t.asked!=null?`<span class="pt-badge asked">言われて +${t.asked}円</span>`:'',
        t.self!=null ?`<span class="pt-badge self">自分で +${t.self}円</span>`:''].join('');
    return `<div class="task-card${t.penalty?' penalty-card':''}">
      <div class="task-body">
        <div class="task-emoji" style="background:${t.bg||'#EEE0FF'}">${t.icon}</div>
        <div class="task-info">
          <div class="task-name">${t.name}</div>
          <div class="task-pts">${badges}</div>
        </div>
        <div class="task-btns">${btns}</div>
      </div>
    </div>`;
  }).join('');
}

async function loadData(){
  document.getElementById('tasks').classList.add('disabled');
  const today=now.toISOString().slice(0,10);
  const [{data:todayData},{data:monthData}]=await Promise.all([
    sb.from('logs').select('*').eq('child_name',childName).gte('created_at',today+'T00:00:00').order('created_at',{ascending:false}),
    sb.from('logs').select('points').eq('child_name',childName).gte('created_at',yearMonth+'-01T00:00:00')
  ]);
  todayLogs=todayData||[];
  monthTotal=(monthData||[]).reduce((s,r)=>s+r.points,0);
  document.getElementById('total').textContent=monthTotal.toLocaleString();
  document.getElementById('tasks').classList.remove('disabled');
  renderLogs();
}

async function record(taskId,type){
  const t=tasks.find(t=>t.id===taskId);
  if(!t)return;
  let pts,mode;
  if(type==='penalty'){pts=t.asked;mode='minus';}
  else if(type==='asked'){pts=t.asked;mode='asked';}
  else{pts=t.self;mode='plus';}
  showSaving(true);
  const{data,error}=await sb.from('logs').insert({
    child_name:childName,task_name:t.name,task_category:t.cat,points:pts,mode:mode
  }).select().single();
  showSaving(false);
  if(error){alert('保存エラー: '+error.message);return;}
  todayLogs.unshift(data);
  monthTotal+=pts;
  const el=document.getElementById('total');
  el.textContent=monthTotal.toLocaleString();
  el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
  renderLogs();
  showToast(pts,mode);
  if(pts>=50)spawnConfetti();
}

function renderLogs(){
  const el=document.getElementById('log-list');
  // Update stat cards
  document.getElementById('stat-self').textContent=todayLogs.filter(l=>l.mode==='plus'||l.mode==='self').length;
  document.getElementById('stat-asked').textContent=todayLogs.filter(l=>l.mode==='asked').length;
  document.getElementById('stat-penalty').textContent=todayLogs.filter(l=>l.mode==='minus').length;
  if(!todayLogs.length){el.innerHTML='<div class="log-empty">まだきろくがありません 🌟</div>';return;}
  el.innerHTML=todayLogs.map(l=>{
    const t=new Date(l.created_at);
    const dateStr=`${t.getMonth()+1}/${t.getDate()}`;
    const timeStr=`${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
    return `<div class="log-item">
      <span class="log-pts ${l.mode}">${l.points>0?'+'+l.points:l.points}円</span>
      <span class="log-text">${l.task_name}</span>
      <span class="log-time">${dateStr} ${timeStr}</span>
      <button class="log-undo" onclick="undoLog('${l.id}')">取消</button>
    </div>`;
  }).join('');
}

async function undoLog(id){
  showSaving(true);
  const{error}=await sb.from('logs').delete().eq('id',id);
  showSaving(false);
  if(error){alert('削除エラー: '+error.message);return;}
  const log=todayLogs.find(l=>l.id===id);
  if(log){monthTotal-=log.points;document.getElementById('total').textContent=monthTotal.toLocaleString();}
  todayLogs=todayLogs.filter(l=>l.id!==id);
  renderLogs();
}

function showSaving(on){document.getElementById('saving').classList.toggle('show',on);}
function showToast(pts,mode){
  const el=document.createElement('div');
  el.className=`toast ${mode}`;
  el.textContent=pts>0?`+${pts}円 ゲット！🎉`:`${pts}円 ペナルティ…😢`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),2300);
}
function spawnConfetti(){
  const colors=['#FFD166','#06D6A0','#118AB2','#EF476F','#9B5DE5','#FF7F3F'];
  const layer=document.getElementById('confetti');
  for(let i=0;i<24;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*.5}s;animation-duration:${.8+Math.random()*.7}s;`;
    layer.appendChild(p);setTimeout(()=>p.remove(),1600);
  }
}

loadTasks();
loadData();
</script>
